[General]
network = hopcount.HopNetwork
sim-time-limit = 100s

# ── Logging ────────────────────────────────────────────────────
**.cmdenv-log-level = detail

# ── Result recording ───────────────────────────────────────────
# Record the finalHopCount signal as both a vector and a scalar
**.receiver.finalHopCount.result-recording-modes = all
**.receiver.finalHopCount.vector-recording = true

# Record router statistics
**.r[*].hopCount.result-recording-modes = all
**.r[*].dropped.result-recording-modes = all

# Record per-router statistics
**.r[*].packetsForwarded.result-recording-modes = all
**.r[*].packetsDropped.result-recording-modes = all

# Record receiver statistics
**.receiver.packetsReceived.result-recording-modes = all
**.receiver.averageHopCount.result-recording-modes = all
**.receiver.totalHops.result-recording-modes = all

# ── Random seeds for 6 independent runs ───────────────────────
# Each run uses a different seed so packets take different random paths.
# In the IDE: Run > Run Configurations > set "Number of runs" or use
#   opp_runall -j4 omnetpp.ini   on the command line.

[Config Run1]
seed-set = 1
description = "Seed 1 – baseline path"

[Config Run2]
seed-set = 2
description = "Seed 2"

[Config Run3]
seed-set = 3
description = "Seed 3"

[Config Run4]
seed-set = 4
description = "Seed 4"

[Config Run5]
seed-set = 5
description = "Seed 5"

[Config Run6]
seed-set = 6
description = "Seed 6 – compare with Run1"
